<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szkolny Konkurs Matematyczny - Wielki Trening Finałowy</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            max-width: 850px;
            margin: 0 auto;
        }
        .header-container {
            background: rgba(255, 255, 255, 0.95);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }
        h1 {
            text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db;
            padding-bottom: 10px; margin-top: 0; margin-bottom: 15px;
        }
        .description { text-align: center; font-size: 1.1em; color: #555; margin: 0; }
        
        .section-header {
            background: #2c3e50; color: #fff; padding: 15px 20px; 
            margin-top: 40px; margin-bottom: 10px; border-radius: 8px;
        }
        .section-header h2 { margin: 0; font-size: 1.3em; }
        .section-theory {
            background: #eec15b3b; border-left: 4px solid #f39c12; 
            padding: 12px 15px; margin-bottom: 20px; border-radius: 0 8px 8px 0;
            font-size: 0.95em; color: #444;
        }

        .task-card {
            background: #fff; padding: 20px 25px; margin-bottom: 20px;
            border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-left: 6px solid #3498db; transition: all 0.3s;
        }
        .task-card.correct-bg { background-color: #d4edda; border-left-color: #28a745; }
        .task-card.incorrect-bg { background-color: #f8d7da; border-left-color: #dc3545; }
        .task-text { font-size: 1.1em; margin-bottom: 15px; }
        
        .input-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        input[type="text"] {
            padding: 10px; font-size: 1em; border: 2px solid #e2e8f0;
            border-radius: 6px; flex-grow: 1; max-width: 300px; outline: none;
        }
        input[type="text"]:focus { border-color: #3498db; }
        
        button {
            background-color: #3498db; color: white; border: none; padding: 10px 20px;
            font-size: 1em; border-radius: 6px; cursor: pointer; transition: 0.2s;
        }
        button:hover { background-color: #2980b9; }
        button.btn-hint { background-color: #f39c12; }
        button.btn-hint:hover { background-color: #d68910; }
        button.btn-answer { background-color: #9b59b6; }
        button.btn-answer:hover { background-color: #8e44ad; }
        
        .feedback { font-weight: bold; margin-left: 10px; }
        .correct { color: #1e8449; }
        .incorrect { color: #c0392b; }
        .hint-text { display: none; margin-top: 15px; padding: 12px; background-color: #fff3cd; border-left: 4px solid #ffc107; font-style: italic; color: #856404; border-radius: 0 6px 6px 0; }

        /* MODAL */
        #start-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); display: flex; justify-content: center;
            align-items: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 40px; border-radius: 12px; text-align: center;
            max-width: 400px; width: 90%; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .modal-content input {
            width: 100%; margin-bottom: 15px; padding: 10px; box-sizing: border-box; text-align: center;
            font-size: 1.1em; border: 2px solid #e2e8f0; border-radius: 6px;
        }
        .modal-content button { width: 100%; font-size: 1.1em; padding: 12px; background-color: #27ae60;}
        .modal-content button:hover { background-color: #2ecc71;}
        
        #app-content { display: none; }
        
        .finish-container {
            text-align: center; background: rgba(255,255,255,0.95); padding: 30px;
            border-radius: 12px; margin-top: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        .btn-finish { background-color: #e74c3c; font-size: 1.2em; padding: 15px 30px; }
        .btn-finish:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <div id="start-modal">
        <div class="modal-content">
            <h2>Witaj! 👋</h2>
            <p>Przed rozpoczęciem treningu wpisz swoje dane:</p>
            <input type="text" id="student-name" placeholder="Imię i nazwisko" required onkeydown="if(event.key === 'Enter') startTest()">
            <input type="text" id="student-class" placeholder="Klasa (np. 5A)" required onkeydown="if(event.key === 'Enter') startTest()">
            <button onclick="startTest()">Rozpocznij trening</button>
            <p id="modal-error" style="color: red; font-size: 0.9em; display: none;">Proszę wypełnić wszystkie pola!</p>
        </div>
    </div>

    <div id="app-content">
        <div class="header-container">
            <h1>Szkolny Konkurs Matematyczny</h1>
            <p class="description">Rozwiąż zadania przygotowawcze z matematyki. Możesz zatwierdzić odpowiedź klikając 'Sprawdź' lub naciskając klawisz <b>Enter</b>!</p>
        </div>

        <div id="tasks-container"></div>

        <div class="finish-container">
            <h2 id="finish-text">Skończyłeś cały trening? Wyślij wyniki do nauczyciela!</h2>
            <button class="btn-finish" id="btn-submit" onclick="sendResults()">Wyślij wyniki 📧</button>
        </div>
    </div>

    <script>
        let currentStudent = "";
        let currentClass = "";
        let resultsData = {}; 
        let userAttempts = {};

        function startTest() {
            const nameInput = document.getElementById("student-name").value.trim();
            const classInput = document.getElementById("student-class").value.trim();
            
            if(nameInput === "" || classInput === "") {
                document.getElementById("modal-error").style.display = "block";
                return;
            }
            
            currentStudent = nameInput;
            currentClass = classInput;
            
            document.getElementById("start-modal").style.display = "none";
            document.getElementById("app-content").style.display = "block";
        }

        const sectionsData = [
            {
                title: "Blok 1: Rachunki pisemne na liczbach naturalnych (Powtórzenie)",
                theory: "<b>Ważne:</b> Przy mnożeniu pisemnym pamiętaj o odpowiednim przesuwaniu kolejnych rzędów cyfr w lewo. Przy dzieleniu uważaj na zera pojawiające się w środku wyniku oraz dokładnie zapisuj resztę, jeśli występuje.",
                tasks: [
                    { id: 1, text: "Oblicz sposobem pisemnym: 352 · 6", hint: "Pomnóż kolejno jedności, dziesiątki i setki przez 6, pamiętając o przenoszeniu dalej.", answers: ["2112"] },
                    { id: 2, text: "Oblicz sposobem pisemnym: 214 · 25", hint: "Najpierw pomnóż 214 przez 5, a w nowym rzędzie poniżej (z przesunięciem o jedno miejsce w lewo) pomnóż 214 przez 2. Na koniec dodaj oba wyniki.", answers: ["5350"] },
                    { id: 3, text: "Oblicz sposobem pisemnym: 305 · 47", hint: "Uważaj na zero w środku liczby 305! Pamiętaj, że 7 · 0 = 0, ale musisz dodać cyfrę przeniesioną dalej.", answers: ["14335"] },
                    { id: 4, text: "Oblicz sposobem pisemnym: 1248 : 3", hint: "Dziel kolejno od lewej strony. Gdy dzielisz 2 przez 3, pamiętaj o zapisaniu zera w odpowiednim miejscu wyniku przed przejściem do liczby 24.", answers: ["416"] },
                    { id: 5, text: "Oblicz sposobem pisemnym: 768 : 24", hint: "Sprawdź najpierw, ile razy liczba 24 mieści się w 76. Zapisz wynik, odejmij, dopisz 8 i dziel dalej.", answers: ["32"] },
                    { id: 6, text: "Wykonaj dzielenie z resztą: 583 : 6. Podaj samą wartość reszty!", hint: "Wykonaj pełne dzielenie pisemne. Liczba, która zostanie na samym dole i jest mniejsza od 6, to Twoja reszta.", answers: ["1"] }
                ]
            },
            {
                title: "Blok 2: Dodawanie i odejmowanie ułamków dziesiętnych",
                theory: "<b>Ważne:</b> Podstawowa zasada to <b>przecinek pod przecinkiem</b>! Jeśli liczby mają różną liczbę cyfr po przecinku, dopisz zera pomocnicze na końcu ułamka (np. 4,3 zamień na 4,30).",
                tasks: [
                    { id: 7, text: "Oblicz sumę liczb: 7,18 + 2,46", hint: "Podpisz przecinek pod przecinkiem i dodawaj od prawej strony: 8 + 6 = 14 (4 zapisujesz, 1 dalej)...", answers: ["9.64", "9,64"] },
                    { id: 8, text: "Oblicz pisemnie: 12,8 + 3,45", hint: "Dopisz zero do pierwszej liczby, aby wyrównać rzędy: 12,80 + 3,45. Pamiętaj o przecinku pod przecinkiem.", answers: ["16.25", "16,25"] },
                    { id: 9, text: "Oblicz pisemnie: 18,3 + 0,005", hint: "Dopisz dwa zera pomocnicze: 18,300 + 0,005.", answers: ["18.305", "18,305"] },
                    { id: 10, text: "Oblicz różnicę liczb: 12,45 - 7,89", hint: "Podpisz równo i odejmuj. Pamiętaj o pożyczaniu od sąsiedniego rzędu, gdy cyfra na górze jest mniejsza niż na dole.", answers: ["4.56", "4,56"] },
                    { id: 11, text: "Oblicz pisemnie: 5,4 - 2,13", hint: "Częsta pułapka! Zanim zaczniesz odejmować, dopisz zero: 5,40 - 2,13. Teraz musisz pożyczyć z rzędu dziesiątych.", answers: ["3.27", "3,27"] },
                    { id: 12, text: "Oblicz pisemnie: 12 - 4,35", hint: "Liczbę całkowitą 12 zapisz jako 12,00 i dopiero wtedy wykonaj odejmowanie pisemne pod przecinkiem.", answers: ["7.65", "7,65"] }
                ]
            },
            {
                title: "Blok 3: Mnożenie i dzielenie ułamków dziesiętnych",
                theory: "<b>Mnożenie:</b> Pomnóż liczby tak, jakby nie miały przecinków. Na koniec policz, ile cyfr po przecinku było łącznie w obu liczbach i odlicz tyle samo miejsc od prawej strony w wyniku.<br><b>Dzielenie:</b> Przesuń przecinek w obu liczbach w prawo o tyle miejsc, by w dzielniku (drugiej liczbie) powstała liczba całkowita.",
                tasks: [
                    { id: 13, text: "Oblicz: 5,12 · 6", hint: "Pomnóż 512 · 6 w słupek. W otrzymanym wyniku odlicz dwa miejsca od prawej strony i wstaw przecinek.", answers: ["30.72", "30,72"] },
                    { id: 14, text: "Oblicz: 1,2 · 2,3", hint: "Pomnóż pisemnie 12 · 23. Ponieważ każda z liczb miała po jednej cyfrze po przecinku, w ostatecznym wyniku odlicz łącznie dwa miejsca od prawej.", answers: ["2.76", "2,76"] },
                    { id: 15, text: "Oblicz: 0,03 · 4,2", hint: "Wykonaj działanie 3 · 42. Następnie odlicz od prawej strony aż trzy miejsca po przecinku (w razie potrzeby dopisz zero na początku rezultatu).", answers: ["0.126", "0,126"] },
                    { id: 16, text: "Oblicz: 12,48 : 4", hint: "Wykonaj dzielenie tak jak na liczbach naturalnych, a przecinek w wyniku postaw dokładnie nad przecinkiem w dzielonej liczbie.", answers: ["3.12", "3,12"] },
                    { id: 17, text: "Oblicz: 4,8 : 0,12", hint: "Przesuń przecinek w obu liczbach o dwa miejsca w prawo. Otrzymasz prostsze działanie do obliczenia: 480 : 12.", answers: ["40"] },
                    { id: 18, text: "Oblicz: 0,156 : 0,12", hint: "Przesuń przecinek w obu liczbach o dwa miejsca w prawo. Otrzymasz łatwiejsze działanie do wykonania pisemnego: 15,6 : 12.", answers: ["1.3", "1,3"] }
                ]
            },
            {
                title: "Blok 4: Wielostopniowy porządek działań (Kolejność wykonywania działań)",
                theory: "<b>Kolejność:</b> 1. Działania w nawiasach, 2. Mnożenie i dzielenie (od lewej do prawej), 3. Dodawanie i odejmowanie (od lewej do prawej).",
                tasks: [
                    { id: 19, text: "Oblicz: 48 : 6 · 2 + (51 - 45) · 3", hint: "Najpierw wykonaj nawias (51 - 45 = 6). Potem od lewej strony: 48 : 6 = 8, następnie 8 · 2 = 16. Na końcu 16 + (6 · 3).", answers: ["34"] },
                    { id: 20, text: "Oblicz z nawiasami kwadratowymi: 100 - [4 · (23 - 15) - 12]", hint: "Zacznij od najgłębszego nawiasu: 23 - 15 = 8. Potem wykonaj działania w nawiasie kwadratowym: 4 · 8 - 12. Na końcu odejmij ten wynik od 100.", answers: ["80"] },
                    { id: 21, text: "Oblicz: 50 + 5 · [32 - (4 + 3 · 6)]", hint: "Najpierw w wewnętrznym nawiasie wykonaj mnożenie: 3 · 6 = 18, potem dodaj 4. Odejmij wynik od 32 w nawiasie kwadratowym. Pamiętaj o pierwszeństwie mnożenia przed końcowym dodawaniem!", answers: ["100"] },
                    { id: 22, text: "Oblicz: 64 : 8 : 2 · 5 + (33 - 3 · 9)", hint: "Najpierw nawias (33 - 27). Po lewej stronie wykonuj dzielenia i mnożenie po kolei od lewej do prawej: najpierw 64 : 8, potem wynik przez 2, potem razy 5.", answers: ["26"] },
                    { id: 23, text: "Oblicz: [(18 + 22) : 5 · 3] - 4 · 4", hint: "Wewnętrzny nawias to 40. Potem w kwadratowym od lewej strony: 40 : 5 = 8, a następnie 8 · 3 = 24. Na koniec odejmij 4 · 4.", answers: ["8"] },
                    { id: 24, text: "Oblicz: [100 - (5 · 8 + 20)] : 8 · 7", hint: "Najpierw policz nawias wewnętrzny (40 + 20 = 60). Odejmij od 100. Wynik z nawiasu kwadratowego podziel przez 8, a na koniec pomnóż przez 7.", answers: ["35"] }
                ]
            },
            {
                title: "Blok 5: Zadania tekstowe i logiczne",
                theory: "<b>Wskazówka:</b> W zadaniach tekstowych dokładnie rozpisz sobie dane krok po kroku. Przy zadaniach typu 'pomyślałem liczbę' najłatwiej zastosować metodę wykonywania działań w odwrotnej kolejności.",
                tasks: [
                    { id: 25, text: "Do szkolnego schroniska zakupiono 8 paczek karmy dla psów po 5 kg każda oraz 6 paczek karmy dla kotów po 4 kg każda. Całą karmę postanowiono przepakować do mniejszych pojemników o pojemności 8 kg każdy. Ile takich pojemników uda się napełnić w całości?", hint: "Oblicz łączną wagę karmy (8 · 5 + 6 · 4 = 40 + 24 = 64 kg), a następnie podziel wynik przez pojemność jednego pojemnika (8 kg).", answers: ["8"] },
                    { id: 26, text: "Pani Barbara kupiła 3 kg jabłek po 4 zł za kilogram oraz 2 kg gruszek. Za wszystko zapłaliła banknotem 50 zł i otrzymała 22 zł reszty. Ile kosztował jeden kilogram gruszek?", hint: "Najpierw oblicz, ile kosztowały całe zakupy (50 - 22 = 28 zł). Potem odejmij od tego koszt jabłek (3 · 4 = 12 zł). Otrzymany wynik (cenę za 2 kg gruszek) podziel przez 2.", answers: ["8"] },
                    { id: 27, text: "Rowerzysta w ciągu pierwszej godziny przejechał 16 km. W ciągu drugiej godziny przejechał o 4 km mniej niż w pierwszej, a w ciągu trzeciej godziny pokonał trasę dwa razy krótszą niż w drugiej. Ile kilometrów przejechał łącznie w ciągu tych trzech godzin?", hint: "Oblicz dystans z drugiej godziny (16 - 4 = 12 km), potem z trzeciej (12 : 2 = 6 km), a na końcu zsumuj wyniki ze wszystkich trzech godzin.", answers: ["34"] },
                    { id: 28, text: "Duża beczka zawiera 60 litrów wody, a mała baryłka mieści o 45 litrów mniej. W kanistrze jest 3 razy mniej wody niż w małej baryłce. Ile litrów wody mieści kanister?", hint: "Dowiedz się, ile litrów jest w małej baryłce (60 - 45 = 15 l), a następnie podziel ten wynik przez 3.", answers: ["5"] },
                    { id: 29, text: "Pomyślałem pewną liczbę. Jeśli pomnożę ją przez 6, a od iloczynu odejmę 14, to otrzymam wynik 40. Jaką liczbę pomyślałem?", hint: "Rozwiązuj zadanie od końca, wykonując działania odwrotne: do wyniku 40 dodaj 14 (co da 54), a otrzymaną sumę podziel przez 6.", answers: ["9"] },
                    { id: 30, text: "Ewa rozłożyła cukierki na 4 talerzyki po 8 sztuk na każdym, ale zostało jej jeszcze 8 cukierków w dłoni. Chciała rozłożyć wszystkie posiadane cukierki tak, aby na każdym talerzyku było ich po równo. Ile cukierków ostatecznie znajdzie się na każdym talerzyku?", hint: "Oblicz całkowitą liczbę cukierków, jakie miała Ewa (4 · 8 + 8 = 32 + 8 = 40). Następnie podziel tę sumę przez 4 talerzyki.", answers: ["10"] }
                ]
            }
        ];

        const container = document.getElementById("tasks-container");
        let totalTasksCount = 0;

        // GENEROWANIE STRUKTURY Z PODZIAŁEM NA BLOKI
        sectionsData.forEach((section) => {
            container.innerHTML += `
                <div class="section-header">
                    <h2>${section.title}</h2>
                </div>
                <div class="section-theory">
                    ${section.theory}
                </div>
            `;

            section.tasks.forEach((task) => {
                totalTasksCount++;
                resultsData[task.id] = "Nie rozwiązano"; 

                const answersJson = JSON.stringify(task.answers).replace(/"/g, "'");
                const firstAnswer = task.answers[0];

                container.innerHTML += `
                    <div class="task-card" id="card${task.id}">
                        <div class="task-text"><strong>${task.id}.</strong> ${task.text}</div>
                        <div class="input-group">
                            <input type="text" id="input${task.id}" placeholder="Wpisz odpowiedź..." onkeydown="if(event.key === 'Enter') checkAnswer(${task.id}, 'input${task.id}', 'card${task.id}', 'feedback${task.id}', ${answersJson}, 'btn-answer${task.id}')">
                            <button onclick="checkAnswer(${task.id}, 'input${task.id}', 'card${task.id}', 'feedback${task.id}', ${answersJson}, 'btn-answer${task.id}')">Sprawdź</button>
                            <button class="btn-hint" onclick="document.getElementById('hint${task.id}').style.display='block'">Podpowiedź</button>
                            
                            <button class="btn-answer" id="btn-answer${task.id}" style="display: none;" onclick="showAnswer(${task.id}, 'input${task.id}', '${firstAnswer}', 'card${task.id}', 'feedback${task.id}', 'btn-answer${task.id}')">Odpowiedź</button>
                            
                            <span id="feedback${task.id}" class="feedback"></span>
                        </div>
                        <div id="hint${task.id}" class="hint-text">${task.hint}</div>
                    </div>
                `;
            });
        });

        function checkAnswer(taskNum, inputId, cardId, feedbackId, correctAnswers, btnAnswerId) {
            let userInput = document.getElementById(inputId).value;
            let feedbackEl = document.getElementById(feedbackId);
            let cardEl = document.getElementById(cardId);
            let btnAnswer = document.getElementById(btnAnswerId);
            
            cardEl.classList.remove("correct-bg", "incorrect-bg");

            let normalized = userInput.replace(/\s+/g, '').toLowerCase().replace(',', '.');
            if (normalized === "") return (feedbackEl.textContent = "Wpisz odpowiedź!", feedbackEl.className = "feedback incorrect");

            if (userAttempts[inputId] === undefined) userAttempts[inputId] = new Set();

            let isCorrect = correctAnswers.some(ans => ans.toLowerCase() === normalized || ans.toLowerCase().replace('.', ',') === normalized.replace('.', ','));

            if (isCorrect) {
                feedbackEl.textContent = "Dobrze!"; 
                feedbackEl.className = "feedback correct"; 
                cardEl.classList.add("correct-bg");
                btnAnswer.style.display = "none";
                
                if(resultsData[taskNum] !== "Podglądał odpowiedź") {
                    resultsData[taskNum] = "Samodzielnie";
                }
            } else {
                if (userAttempts[inputId].has(userInput)) {
                    feedbackEl.textContent = "Już podałeś taką odpowiedź. Spróbuj inną!";
                } else {
                    userAttempts[inputId].add(userInput);
                    feedbackEl.textContent = "Spróbuj jeszcze raz.";
                }
                feedbackEl.className = "feedback incorrect"; 
                cardEl.classList.add("incorrect-bg");
                
                if (userAttempts[inputId].size >= 2) {
                    btnAnswer.style.display = "inline-block";
                }
            }
        }

        function showAnswer(taskNum, inputId, correctAnswer, cardId, feedbackId, btnAnswerId) {
            document.getElementById(inputId).value = correctAnswer;
            document.getElementById(cardId).classList.remove("incorrect-bg");
            document.getElementById(cardId).classList.add("correct-bg");
            document.getElementById(feedbackId).innerHTML = "Oto prawidłowa odpowiedź!";
            document.getElementById(feedbackId).className = "feedback correct";
            document.getElementById(btnAnswerId).style.display = "none";
            
            resultsData[taskNum] = "Podglądał odpowiedź";
        }

        function sendResults() {
            let correctCount = 0; let hintCount = 0; let notSolvedCount = 0;
            let detailedReport = "";

            const activeIds = Object.keys(resultsData).map(Number).sort((a,b)=>a-b);

            activeIds.forEach((i) => {
                let inputId = 'input' + i;
                let currentInputVal = document.getElementById(inputId).value.trim();
                let attemptsSet = userAttempts[inputId];
                let wrongAttemptsString = (attemptsSet && attemptsSet.size > 0) ? Array.from(attemptsSet).join(", ") : "";

                if(resultsData[i] === "Samodelimie") {
                    // Do nothing or handle spelling edge case if active tracker differs
                }

                if(resultsData[i] === "Samodzielnie") {
                    correctCount++;
                    if (wrongAttemptsString !== "") {
                        detailedReport += `Zadanie ${i}: Samodzielnie (Błędy przed sukcesem: ${wrongAttemptsString} | Odpowiedź końcowa: ${currentInputVal})\n`;
                    } else {
                        detailedReport += `Zadanie ${i}: Samodzielnie (Odpowiedź: ${currentInputVal})\n`;
                    }
                }
                else if(resultsData[i] === "Podglądał odpowiedź") {
                    hintCount++;
                    detailedReport += `Zadanie ${i}: Podglądał odpowiedź (Błędne próby ucznia: ${wrongAttemptsString || "brak, od razu nacisnął podpowiedź"})\n`;
                }
                else {
                    notSolvedCount++;
                    if (wrongAttemptsString !== "") {
                        detailedReport += `Zadanie ${i}: Nie rozwiązano (Błędne próby: ${wrongAttemptsString})\n`;
                    } else {
                        detailedReport += `Zadanie ${i}: Nie rozwiązano (Pole puste)\n`;
                    }
                }
            });

            const finalMessage = `Uczeń: ${currentStudent}\nKlasa: ${currentClass}\n\nWYNIK GŁÓWNY:\n- Rozwiązane samodzielnie: ${correctCount} z ${totalTasksCount}\n- Z użyciem gotowej odpowiedzi: ${hintCount} z ${totalTasksCount}\n- Brak odpowiedzi: ${notSolvedCount} z ${totalTasksCount}\n\nSZCZEGÓŁY:\n${detailedReport}`;

            const btnSubmit = document.getElementById("btn-submit");
            btnSubmit.textContent = "Wysyłanie...";
            btnSubmit.style.backgroundColor = "#7f8c8d";
            btnSubmit.disabled = true;

            fetch('https://api.web3forms.com/submit', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
                body: JSON.stringify({
                    access_key: "99356b6c-ab77-4ea0-a3cb-99560d40fafa",
                    subject: `Wyniki treningu klasa 5: ${currentStudent} (${currentClass})`,
                    from_name: "Trener Matematyczny",
                    message: finalMessage
                })
            })
            .then(async (response) => {
                if (response.status == 200) {
                    document.getElementById("finish-text").innerText = "Udało się! Wyniki przygotowania zostały wysłane do nauczyciela. Możesz zamknąć stronę.";
                    btnSubmit.style.display = "none";
                } else {
                    document.getElementById("finish-text").innerText = "Błąd wysyłania. Zgłoś to nauczycielowi.";
                    btnSubmit.textContent = "Spróbuj ponownie";
                    btnSubmit.disabled = false;
                    btnSubmit.style.backgroundColor = "#e74c3c";
                }
            })
            .catch(error => {
                console.log(error);
                document.getElementById("finish-text").innerText = "Błąd połączenia. Sprawdź internet i spróbuj ponownie.";
                btnSubmit.textContent = "Wyślij ponownie";
                btnSubmit.disabled = false;
                btnSubmit.style.backgroundColor = "#e74c3c";
            });
        }
    </script>
</body>
</html>
